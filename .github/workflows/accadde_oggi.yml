name: Rubrica Accade Oggi

on:
  workflow_dispatch:        # Avvio manuale quando vuoi

permissions:
  actions: write
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Controlla il codice della repository
      uses: actions/checkout@v6

    - name: Configura Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Installa le dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade google-genai

    - name: Esegui lo script Python
      env:
        TZ: Europe/Rome
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python -u script.py

    - name: Pulisci la cronologia dei run
      if: always()
      env:
        GH_TOKEN: ${{ github.token }}
        KEEP: "0"   # 0 = cancella TUTTI i run precedenti; resta visibile solo quello in corso
                    # (un run non puo' cancellare se' stesso mentre gira: limite di GitHub)
      run: |
        # Cancella i run COMPLETATI di questo stesso workflow,
        # tenendo solo gli ultimi $KEEP.
        gh api "repos/${{ github.repository }}/actions/workflows/accadde_oggi.yml/runs?status=completed&per_page=100" \
          --jq '.workflow_runs | sort_by(.created_at) | reverse | .['"$KEEP"':] | .[].id' |
        while read -r RUN_ID; do
          echo "Elimino run $RUN_ID"
          gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$RUN_ID" || true
        done
        echo "Pulizia completata."
